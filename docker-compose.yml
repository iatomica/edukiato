services:
  # --- Backend (API) ---
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-edukiato_db}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-please_change_this_secret_in_prod}
    networks:
      - edukiato-network

  # --- Frontend (Web App) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - edukiato-network

volumes:
  postgres_data:

networks:
  edukiato-network:
    driver: bridge
